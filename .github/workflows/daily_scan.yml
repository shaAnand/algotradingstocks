name: Daily Stock Swing Scan

on:
  schedule:
    # 4:05 PM ET = 21:05 UTC (accounts for market close + data settling)
    - cron: '5 21 * * 1-5'  # Monday-Friday only
  workflow_dispatch:  # Allows manual trigger from GitHub UI for testing

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install --upgrade pip --no-cache-dir
          pip install -r requirements.txt --no-cache-dir

      - name: Run stock swing bot
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          ALPACA_PAPER: 'true'
          PYTHONPATH: ${{ github.workspace }}
        run: python3 bot.py --once

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stock-scan-log-${{ github.run_number }}
          path: logs/
          retention-days: 30
